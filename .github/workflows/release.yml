name: Build and Package for Release

on:
  release:
    types: [published]

jobs:
  # LINUX – Flatpak
  linux-flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: gtkapp.flatpak
          manifest-path: flatpak/io.github.tuouser.GtkApp.json
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@v2
        with:
          files: gtkapp.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # MACOS – .dmg
  macos-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GTK4
        run: brew install gtk4

      - name: Build binary
        run: |
          mkdir -p build
          gcc -O2 -Wall -Wextra -std=c11 $(pkg-config --cflags gtk4) -o build/gtkapp src/utils/gesture_manager.c src/utils/animations.c src/*.c src/**/*.c $(pkg-config --libs gtk4) -lm

      - name: Create app bundle
        run: |
          mkdir -p GtkApp.app/Contents/MacOS
          mkdir -p GtkApp.app/Contents/Resources
          cp build/gtkapp GtkApp.app/Contents/MacOS/
          cp flatpak/Info.plist GtkApp.app/Contents/

      - name: Create DMG
        run: hdiutil create -volname "GtkApp" -srcfolder "GtkApp.app" -ov -format UDZO "GtkApp.dmg"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: GtkApp.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
