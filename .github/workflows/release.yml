name: Build and Package for Release

on:
  release:
    types: [published]

jobs:
  # LINUX – Flatpak
  linux-flatpak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Build Flatpak
        run: |
          mkdir -p ~/.local/share/flatpak
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --disable-rofiles-fuse --install-deps-from=flathub --repo=repo flatpak_app flatpak/io.github.tuouser.GtkApp.json
          flatpak build-bundle repo gtkapp.flatpak io.github.accaicedtea.GtkApp

      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@v2
        with:
          files: gtkapp.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # MACOS – .dmg
  macos-dmg:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v3
        with:
          path: ~/Library/Caches/Homebrew
          key: macos-homebrew-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: macos-homebrew-

      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: ~/Library/Caches/ccache
          key: macos-ccache-${{ hashFiles('src/**', 'include/**') }}
          restore-keys: macos-ccache-

      - name: Install GTK4 and dependencies
        run: brew install gtk4 libpq ccache

      - name: Build binary
        run: |
          mkdir -p build
          export PKG_CONFIG_PATH="$(brew --prefix gtk4)/lib/pkgconfig:$(brew --prefix libpq)/lib/pkgconfig:$PKG_CONFIG_PATH"
          export CFLAGS="-I$(brew --prefix gtk4)/include -I$(brew --prefix libpq)/include"
          export LDFLAGS="-L$(brew --prefix gtk4)/lib -L$(brew --prefix libpq)/lib"
          export PATH="/usr/local/opt/ccache/libexec:$PATH"
          gcc -O2 -Wall -Wextra -std=c11 -Iinclude $(pkg-config --cflags gtk4 libpq) -o build/gtkapp src/utils/gesture_manager.c src/utils/animations.c src/main.c src/controller/app_controller.c src/model/app_model.c src/utils/db_connection.c src/view/app_view.c $(pkg-config --libs gtk4 libpq) -lm

      - name: Create app bundle
        run: |
          mkdir -p GtkApp.app/Contents/MacOS
          mkdir -p GtkApp.app/Contents/Resources
          cp build/gtkapp GtkApp.app/Contents/MacOS/
          cp flatpak/Info.plist GtkApp.app/Contents/

      - name: Create DMG
        run: hdiutil create -volname "GtkApp" -srcfolder "GtkApp.app" -ov -format UDZO "GtkApp.dmg"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: GtkApp.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
